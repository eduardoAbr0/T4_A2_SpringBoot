<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <!-- JQUERY para desaparecer mensajes-->
    <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
    <script type="text/javascript">
        $(document).ready(function () {
            setTimeout(function () {
                $(".messages").fadeOut(1500);
            }, 3000);
        });
    </script>

</head>

<body>

    <header>
        <nav class="navbar fixed-top navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <img src="{% static 'assets/images/estudiantes.png' %}" class="img-fluid">
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarsExample07"
                    aria-controls="navbarsExample07" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarsExample07">
                    <ul class="navbar-nav mr-auto">
                        <li class="nav-item active">
                            <a class="nav-link" href="#">INICIO</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Asignaturas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Docentes</a>
                        </li>
                    </ul>

                </div>
            </div>
        </nav>
    </header>

    <div class="container mt-5 mb-5">

        <div class="row">

            <div class="col-md-12">

                <h1 style="font-size: 28px; margin-top: 50px;" class=" text-center">SERVICIOS ESCOLARES </h1>



                <div class="col-md-10">

                    <!-- NVEGACION -->

                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item" aria-current="page">Inicio</li>
                            <li class="breadcrumb-item active" aria-current="page">Alumnos</li>
                        </ol>
                    </nav>

                    <div class="row">

                        <div class="col-md-12">

                            <div class="content-box-large">

                                <div class="panel-heading">
                                    <div class="panel-title">
                                        <h2>Listado de Alumnos</h2>
                                    </div>
                                </div>

                                <div class="panel-body">

                                    <!-- <div class="msj alert alert-primary" role=alert""></div> -->

                                    <ul class="messages list-group mb-3">
                                        <li {% if message.tags %}
                                            class="{{ message.tags }} list-group-item list-group-item-success"
                                            {%endif%}>
                                            {{ message }}
                                        </li>
                                    </ul>




                                    <a th:href="@{/showNewAlumnoForm}" class="btn btn-success mt-4 ml-3">AGREGAR</a>


                                    <!-- Cargar los alumnos en una tabla html -->
                                    <section class="example mt-4">
                                        <div class="table-responsive" id="tabla_alumnos">

                                            <table class='table table-striped table-bordered table-hover text-center'>
                                                <thead>
                                                    <tr>
                                                        <th> Numero de Control</th>
                                                        <th> Nombre</th>
                                                        <th> Primer Ap.</th>
                                                        <th> Segundo Ap.</th>
                                                        <th> ACCIONES</th>
                                                    </tr>
                                                </thead>
                                                <tbody>

                                                    <tr th:each="alumno : ${listAlumnos}">
                                                        <td class='v-align-middle' th:text="${alumno.numControl}"></td>
                                                        <td class='v-align-middle' th:text="${alumno.nombre}"></td>
                                                        <td class='v-align-middle' th:text="${alumno.primerAp}"></td>
                                                        <td class='v-align-middle' th:text="${alumno.segundoAp}"></td>

                                                        <td class='v-align-middle'>
                                                                <a th:href="@{/showFormForUpdate/{id}(id=${alumno.id})}" class="btn btn-primary btn-sm"> Editar </a>
                                                                <a th:href="@{/showFormForDetail/{id}(id=${alumno.id})}" class="btn btn-warning btn-sm"> Detalle </a>

                                                                <a th:href="@{/deleteAlumno/{id}(id=${alumno.id})}" onclick="confirmarEliminacion()" class="btn btn-danger btn-sm"> Eliminar </a>

                                                            </form>
                                                        </td>
                                                    </tr>

                                                </tbody>
                                            </table>


                                        </div>
                                    </section>
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    </div>

    <hr>
    <footer class="text-muted mt-3 mb-3">
        <div align="center">
            FOOTER
        </div>
    </footer>


    <!-- Alumnos desde BASE DE DATOS ---------------- -->
    <script type="text/javascript">

        function confirmarEliminacion() {
            if (confirm("Estas seguro de ELIMINAR el registro?"))
                return true;
            else
                return false;
        }
    </script>

</body>

</html>
