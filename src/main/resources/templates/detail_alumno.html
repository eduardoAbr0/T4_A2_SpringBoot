<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <title>Cambio alumno</title>
</head>

<body>
    <div class="container">
        <h1>Control de Sistema Escolar</h1>
        <hr>
        <h2>Vista alumno</h2>

        <form th:object="${alumno}" method="POST">

            <div class="col-4 mb-4">
                <label for="numControl" class="form-label fw-bold">Número de Control</label>
                <input type="text" id="numControl" th:field="*{numControl}" placeholder="Número de control"
                    class="form-control" readonly>
            </div>

            <div class="col-4 mb-4">
                <label for="nombre" class="form-label fw-bold">Nombre del Alumno</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Nombre de alumno" class="form-control" readonly>
            </div>

            <div class="col-4 mb-4">
                <label for="primerAp" class="form-label fw-bold">Primer Apellido</label>
                <input type="text" id="primerAp" th:field="*{primerAp}" placeholder="Primer apellido de alumno"
                    class="form-control" readonly>
            </div>

            <div class="col-4 mb-4">
                <label for="segundoAp" class="form-label fw-bold">Segundo Apellido</label>
                <input type="text" id="segundoAp" th:field="*{segundoAp}" placeholder="Segundo apellido de alumno"
                    class="form-control" readonly>
            </div>

            <div class="col-4 mb-4">
                <label for="fechaNac" class="form-label fw-bold">Fecha de Nacimiento</label>
                <input type="text" id="fechaNac" th:field="*{fechaNac}" placeholder="Fecha nacimiento de alumno"
                    class="form-control" readonly>
            </div>

            <div class="col-4 mb-4">
                <label for="semestre" class="form-label fw-bold">Semestre</label>
                <input type="text" id="semestre" th:field="*{semestre}" placeholder="Semestre" class="form-control" readonly>
            </div>

            <div class="col-4 mb-4">
                <label for="carrera" class="form-label fw-bold">Carrera</label>
                <input type="text" id="carrera" th:field="*{carrera}" placeholder="Carrera" class="form-control" readonly>
            </div>

        </form>

        <hr>

        <a th:href="@{/}">Volver a inicio</a>
    </div>
</body>

</html>
